<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USYD Meta Lab — Members</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Tokens (match main site exactly) ──────────────────────────────────── */
:root {
  --color-bg:        #fcf6ef;
  --color-bg-warm:   #f6f0e9;
  --color-bg-card:   #f0e8dd;
  --color-bg-dark:   #2b180a;
  --color-text:      #2b180a;
  --color-text-muted:#6b5a4a;
  --color-text-light:#9a8a7a;
  --color-accent:    #c8956c;
  --color-accent-h:  #b07a52;
  --color-border:    #e0d4c6;
  --font-display:    'Playfair Display', Georgia, serif;
  --font-body:       'Inter', -apple-system, sans-serif;
  --font-logo:       'Caveat', cursive;
  --ease:            cubic-bezier(0.16,1,0.3,1);
  --container:       1200px;
  --pad:             64px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { font-size:16px; scroll-behavior:smooth; -webkit-font-smoothing:antialiased; }
body { font-family:var(--font-body); background:var(--color-bg); color:var(--color-text); line-height:1.6; overflow-x:hidden; }
a { color:inherit; text-decoration:none; }
img { max-width:100%; display:block; }

/* ── Password gate ──────────────────────────────────────────────────────── */
#gate {
  position:fixed; inset:0; z-index:2000;
  background:var(--color-bg);
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:32px;
  transition:opacity 0.5s var(--ease);
}
#gate.hidden { opacity:0; pointer-events:none; }
.gate-inner { text-align:center; max-width:400px; padding:0 32px; }
.gate-icon { font-size:2.5rem; margin-bottom:16px; opacity:0.5; }
.gate-title { font-family:var(--font-display); font-size:2rem; font-weight:500; margin-bottom:8px; }
.gate-sub { font-size:0.9rem; color:var(--color-text-muted); margin-bottom:32px; line-height:1.6; }
.gate-form { display:flex; gap:8px; }
.gate-input {
  flex:1; padding:12px 20px; border:1.5px solid var(--color-border);
  border-radius:100px; background:var(--color-bg-warm);
  font-family:var(--font-body); font-size:0.875rem; color:var(--color-text);
  outline:none; transition:border-color 0.3s;
}
.gate-input:focus { border-color:var(--color-accent); }
.gate-btn {
  padding:12px 28px; border:none; border-radius:100px;
  background:var(--color-bg-dark); color:var(--color-bg);
  font-family:var(--font-body); font-size:0.875rem; font-weight:500;
  cursor:pointer; transition:all 0.3s var(--ease);
}
.gate-btn:hover { background:#3d2a18; transform:translateY(-1px); }
.gate-error { font-size:0.8rem; color:#b54a1a; margin-top:8px; min-height:1.2em; }

/* ── Nav ────────────────────────────────────────────────────────────────── */
.nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  height:72px; display:flex; align-items:center;
  padding:0 40px;
}
.nav-inner {
  width:100%; display:flex; align-items:center; justify-content:space-between;
}
.nav-logo {
  display:inline-flex; align-items:center; gap:10px;
  text-decoration:none; color:var(--color-text);
  transition:opacity 0.3s;
}
.nav-logo:hover { opacity:0.7; }
.nav-logo-mark {
  width:36px; height:36px; flex-shrink:0;
}
.nav-logo-mark svg { width:100%; height:100%; }
.nav-logo-wordmark { display:flex; flex-direction:column; line-height:1; }
.nav-logo-name {
  font-family:var(--font-logo); font-size:1.25rem; font-weight:700;
  color:var(--color-text);
}
.nav-logo-sub {
  font-size:0.58rem; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--color-text-muted); margin-top:2px;
}
.nav-links {
  display:flex; gap:32px; align-items:center;
  background:rgba(252,246,239,0.4); padding:10px 28px;
  border-radius:100px; backdrop-filter:blur(12px);
  border:1px solid rgba(224,212,198,0.6);
  box-shadow:0 4px 24px rgba(43,24,10,0.04);
  font-size:0.875rem; color:var(--color-text-muted);
}
.nav-links a { transition:color 0.3s; }
.nav-links a:hover { color:var(--color-text); }
.nav-pill {
  background:var(--color-bg-dark); color:var(--color-bg) !important;
  padding:5px 14px; border-radius:100px; font-size:0.75rem;
  font-weight:600; letter-spacing:0.04em;
}

/* ── Container ──────────────────────────────────────────────────────────── */
.container { max-width:var(--container); margin:0 auto; padding:0 var(--pad); }

/* ── Labels / shared type ───────────────────────────────────────────────── */
.label {
  font-size:0.72rem; font-weight:600; letter-spacing:0.1em;
  text-transform:uppercase; color:var(--color-text-muted);
}
.section-title {
  font-family:var(--font-display);
  font-size:clamp(1.8rem,3.5vw,2.6rem);
  font-weight:500; line-height:1.15;
  letter-spacing:-0.03em; margin-top:12px;
}
.section-desc {
  font-size:1rem; line-height:1.75;
  color:var(--color-text-muted); max-width:580px; margin-top:16px;
}

/* ── Buttons ────────────────────────────────────────────────────────────── */
.btn {
  display:inline-flex; align-items:center; gap:8px;
  font-family:var(--font-body); font-size:0.875rem; font-weight:500;
  padding:12px 28px; border-radius:100px; cursor:pointer;
  border:none; transition:all 0.4s var(--ease);
}
.btn-primary { background:var(--color-bg-dark); color:var(--color-bg); }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(43,24,10,0.2); }
.btn-secondary { background:transparent; color:var(--color-text); border:1px solid var(--color-border); }
.btn-secondary:hover { background:var(--color-bg-warm); transform:translateY(-2px); }

/* ── Sections ───────────────────────────────────────────────────────────── */
.section { padding:100px 0; }
.section-warm { background:var(--color-bg-warm); }
.section-dark { background:var(--color-bg-dark); color:var(--color-bg); }
.section-dark .label { color:var(--color-accent); }
.section-dark .section-desc { color:rgba(252,246,239,0.65); }
.section-header { margin-bottom:56px; }

/* ── Software grid ──────────────────────────────────────────────────────── */
.software-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:16px;
}
.software-card {
  background:var(--color-bg); border-radius:20px; padding:28px;
  transition:all 0.4s var(--ease); display:block;
}
.software-card:hover { transform:translateY(-3px); box-shadow:0 20px 48px rgba(43,24,10,0.07); }
.software-card-icon {
  width:44px; height:44px; border-radius:12px;
  background:var(--color-bg-card); display:flex; align-items:center;
  justify-content:center; font-size:1.3rem; margin-bottom:16px;
}
.software-card h3 {
  font-family:var(--font-display); font-size:1.1rem; font-weight:500; margin-bottom:6px;
}
.software-card p { font-size:0.875rem; color:var(--color-text-muted); line-height:1.6; margin-bottom:14px; }
.software-card-link {
  font-size:0.8rem; font-weight:500; color:var(--color-accent);
  display:inline-flex; align-items:center; gap:4px;
}

/* ── Accounts grid ──────────────────────────────────────────────────────── */
.accounts-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
.account-card {
  background:var(--color-bg-card); border-radius:16px; padding:24px 28px;
  display:flex; align-items:flex-start; gap:16px;
}
.account-num {
  font-family:var(--font-display); font-size:1.5rem; font-weight:500;
  color:var(--color-text-light); line-height:1; flex-shrink:0; width:32px;
}
.account-card h3 { font-size:1rem; font-weight:600; margin-bottom:4px; }
.account-card p { font-size:0.875rem; color:var(--color-text-muted); line-height:1.6; }
.account-card a { color:var(--color-accent); }

/* ── Steps ──────────────────────────────────────────────────────────────── */
.steps { display:flex; flex-direction:column; gap:0; }
.step {
  border-bottom:1px solid var(--color-border);
}
.step:first-child { border-top:1px solid var(--color-border); }
.step > summary {
  display:grid; grid-template-columns:80px 1fr auto; gap:32px;
  padding:36px 0; cursor:pointer; list-style:none;
  align-items:center;
}
.step > summary::-webkit-details-marker { display:none; }
.step > summary::after {
  content:"∨";
  justify-self:end;
  align-self:center;
  font-size:2.4rem;
  line-height:1;
  color:var(--color-text-light);
  transform:translateY(-2px);
  transition:transform 0.25s var(--ease), color 0.25s var(--ease);
}
.step[open] > summary::after {
  content:"∧";
  transform:translateY(-2px);
}
.step > summary:focus-visible {
  outline:2px solid var(--color-accent);
  outline-offset:4px;
  border-radius:12px;
}
.step[open] > summary {
  padding-bottom:18px;
}
.step-num {
  font-family:var(--font-display); font-size:2rem; font-weight:500;
  color:var(--color-text-light); line-height:1; padding-top:4px;
}
.step h3 { font-family:var(--font-display); font-size:1.25rem; font-weight:500; margin-bottom:10px; }
.step-summary p { font-size:0.9375rem; color:var(--color-text-muted); line-height:1.7; margin:0; }
.step-body {
  padding: 0 0 36px calc(80px + 32px);
}
.step-body p {
  font-size:0.9375rem; color:var(--color-text-muted); line-height:1.7;
}
.step-body ul {
  margin: 16px 0 0;
  padding-left: 1.2rem;
  color:var(--color-text-muted);
  line-height:1.7;
}
.step-body li { margin-bottom: 10px; }
.step-body code {
  font-size:0.8rem;
  background:var(--color-bg-card);
  padding:2px 6px;
  border-radius:4px;
}
.step-note {
  margin-top: 18px;
  padding: 18px 20px;
  border-radius: 14px;
  background: var(--color-bg-card);
  border: 1px solid rgba(139, 111, 84, 0.18);
}
.step-links { display:flex; flex-wrap:wrap; gap:10px; margin-top:16px; }
.step-tag {
  padding:6px 16px; border-radius:100px; font-size:0.8rem;
  border:1px solid var(--color-border); color:var(--color-text-muted);
  transition:all 0.3s;
}
.step-tag:hover { border-color:var(--color-accent); color:var(--color-text); }

/* ── Resources list ─────────────────────────────────────────────────────── */
.resources-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.resource-card {
  background:var(--color-bg); border-radius:18px; padding:28px;
  transition:all 0.4s var(--ease); display:flex; flex-direction:column; gap:10px;
}
.resource-card:hover { transform:translateY(-3px); box-shadow:0 20px 48px rgba(43,24,10,0.06); }
.resource-initial {
  width:40px; height:40px; border-radius:10px;
  background:var(--color-bg-dark); color:var(--color-bg);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-size:1.1rem; font-weight:600;
}
.resource-logo {
  width:40px; height:40px; border-radius:10px;
  background:var(--color-bg);
  border:1px solid rgba(54,36,24,0.08);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  flex-shrink:0;
}
.resource-logo img {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.resource-card h3 { font-family:var(--font-display); font-size:1.05rem; font-weight:500; }
.resource-card p { font-size:0.875rem; color:var(--color-text-muted); line-height:1.6; flex:1; }
.resource-arrow { font-size:0.8rem; color:var(--color-accent); margin-top:4px; }

/* ── Code block ─────────────────────────────────────────────────────────── */
.code-block {
  background:var(--color-bg-dark); border-radius:12px;
  padding:24px 28px; margin-top:20px; overflow-x:auto;
}
.code-block code {
  font-family:'Menlo','Consolas',monospace; font-size:0.82rem;
  color:#d4c5a9; line-height:1.8; white-space:pre;
}
.code-comment { color:#6b5a4a; }
.code-fn { color:#c8956c; }
.code-str { color:#a8c97a; }

/* ── Ethics cards ───────────────────────────────────────────────────────── */
.ethics-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; }
.ethics-card {
  border:1.5px solid rgba(252,246,239,0.15); border-radius:20px;
  padding:32px; transition:border-color 0.3s;
}
.ethics-card:hover { border-color:rgba(200,149,108,0.5); }
.ethics-card h3 {
  font-family:var(--font-display); font-size:1.2rem; font-weight:500;
  margin-bottom:12px; color:var(--color-bg);
}
.ethics-card p { font-size:0.9rem; line-height:1.7; color:rgba(252,246,239,0.65); margin-bottom:20px; }

/* ── Meetings ───────────────────────────────────────────────────────────── */
.meetings-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.meeting-card {
  background:var(--color-bg); border-radius:18px; padding:28px;
  border-left:3px solid var(--color-accent);
}
.meeting-type { font-size:0.72rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--color-accent); margin-bottom:10px; }
.meeting-card h3 { font-family:var(--font-display); font-size:1.1rem; font-weight:500; margin-bottom:8px; }
.meeting-card p { font-size:0.875rem; color:var(--color-text-muted); line-height:1.6; }

/* ── Communication box ──────────────────────────────────────────────────── */
.comms-box {
  background:var(--color-bg-card); border-radius:20px; padding:40px 48px;
  display:grid; grid-template-columns:1fr 1fr; gap:48px; margin-top:48px;
}
.comms-box h3 { font-family:var(--font-display); font-size:1.2rem; font-weight:500; margin-bottom:12px; }
.comms-box p { font-size:0.9375rem; color:var(--color-text-muted); line-height:1.7; }

/* ── Folder tree ────────────────────────────────────────────────────────── */
.folder-tree {
  background:var(--color-bg-dark); border-radius:16px;
  padding:28px 32px; font-family:'Menlo','Consolas',monospace;
  font-size:0.82rem; color:#d4c5a9; line-height:1.9; overflow-x:auto;
}
.folder-dir  { color:#c8956c; }
.folder-file { color:#a8c97a; }
.folder-comment { color:#6b5a4a; }

/* ── Footer ─────────────────────────────────────────────────────────────── */
.footer {
  background:var(--color-bg-dark); color:var(--color-bg);
  padding:48px 0; font-size:0.875rem;
}
.footer-inner { display:flex; justify-content:space-between; align-items:center; }
.footer-static-logo {
  display:inline-flex; align-items:center; gap:14px; max-width:100%;
  padding:16px 20px 16px 18px; background:var(--color-bg); color:var(--color-text);
  border-radius:14px; box-shadow:0 4px 32px rgba(0,0,0,0.18);
}
.footer-static-logo-mark {
  width:64px; height:64px; flex:0 0 64px; display:inline-flex;
}
.footer-static-logo-mark svg { width:100%; height:100%; overflow:visible; }
.footer-static-logo-wordmark {
  display:flex; flex-direction:column; line-height:1; padding-bottom:2px;
}
.footer-static-logo-name {
  font-family:var(--font-logo); font-size:2.25rem; font-weight:700; line-height:0.92;
}
.footer-static-logo-sub {
  margin-top:7px; font-size:0.64rem; letter-spacing:0.18em;
  text-transform:uppercase; opacity:0.45; white-space:nowrap;
}
.footer-left p { opacity:0.45; margin-top:4px; font-size:0.8rem; }
.footer-link { opacity:0.5; transition:opacity 0.3s; }
.footer-link:hover { opacity:1; }

/* ── Reveal ─────────────────────────────────────────────────────────────── */
.reveal { opacity:0; transform:translateY(30px); transition:opacity 0.8s var(--ease),transform 0.8s var(--ease); }
.reveal.visible { opacity:1; transform:translateY(0); }

/* ── Research Timeline ──────────────────────────────────────────────────── */
.tl-section { padding:0 0 88px; background:var(--color-bg); }
.tl-section .container { max-width:1460px; }

.tl-topbar {
  position:relative;
  padding-top:0;
  margin-top:0;
  margin-bottom:14px;
}
.tl-slider {
  position:relative;
  width:100%;
  margin-top:86px;
  padding:0 52px;
}
.tl-toggle {
  display:inline-flex;
  align-self:center;
}

/* Nav buttons */
.tl-nav {
  position:absolute;
  top:50%; transform:translateY(-50%);
  width:48px; height:48px; border-radius:50%;
  border:1px solid var(--color-border);
  background:var(--color-bg); color:var(--color-text);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; z-index:10;
  transition:all 0.3s var(--ease);
  box-shadow:0 2px 12px rgba(43,24,10,0.07);
}
.tl-nav:hover:not(:disabled) {
  border-color:var(--color-accent);
  transform:translateY(-50%) translateY(-1px);
  box-shadow:0 6px 20px rgba(43,24,10,0.1);
}
.tl-nav:disabled { opacity:0.3; cursor:default; }
.tl-nav--prev { left:4px; }
.tl-nav--next { right:4px; }

/* Timeline bar */
.tl-bar { margin-top:72px; position:relative; padding:0 60px; }
.tl-line {
  position:absolute;
  top:9px; left:60px; right:60px;
  height:2px; background:var(--color-border); border-radius:2px;
  overflow:hidden;
}
.tl-fill {
  height:100%; width:0%;
  background:var(--color-accent);
  border-radius:2px;
  transition:width 0.65s var(--ease);
}
.tl-dots {
  display:flex;
  justify-content:space-between;
  position:relative;
}
.tl-dot {
  display:flex; flex-direction:column; align-items:center; gap:10px;
  background:none; border:none; cursor:pointer; padding:0;
  transition:opacity 0.3s;
}
.tl-dot:hover { opacity:0.75; }
.tl-dot-pip {
  display:block;
  width:20px; height:20px; border-radius:50%;
  border:2px solid var(--color-border);
  background:var(--color-bg);
  transition:all 0.35s var(--ease);
}
.tl-dot--done .tl-dot-pip {
  border-color:var(--color-accent);
  background:var(--color-accent);
}
.tl-dot--active .tl-dot-pip {
  border-color:var(--color-accent);
  background:var(--color-accent);
  transform:scale(1.3);
  box-shadow:0 0 0 4px rgba(200,149,108,0.18);
}
.tl-dot-label {
  font-size:0.7rem; font-weight:500; letter-spacing:0.04em;
  color:var(--color-text-light); white-space:nowrap;
  transition:color 0.3s;
}
.tl-dot--active .tl-dot-label { color:var(--color-text); font-weight:600; }

/* Detail panel */
.tl-panel {
  width:100%;
}
.tl-panel-card {
  background:var(--color-bg-warm);
  border:1px solid var(--color-border);
  border-radius:24px;
  padding:32px;
  box-shadow:0 18px 48px rgba(43,24,10,0.05);
}
.tl-panel-meta {
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:18px;
}
.tl-panel-copy { max-width:640px; }
.tl-panel-title {
  font-family:var(--font-display);
  font-size:clamp(1.5rem,2.6vw,2.2rem);
  font-weight:500;
  line-height:1.15;
  letter-spacing:-0.03em;
  margin:12px 0 12px;
}
.tl-panel-intro {
  font-size:0.95rem;
  line-height:1.75;
  color:var(--color-text-muted);
}
.tl-panel-actions {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-self:flex-start;
  margin-top:2px;
}
.tl-panel-body {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
  gap:16px;
}
.tl-panel-section {
  padding:18px 18px 16px;
  border:1px solid rgba(224,212,198,0.85);
  border-radius:18px;
  background:rgba(252,246,239,0.55);
}
.tl-panel-section h4 {
  font-size:0.82rem;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--color-accent);
  margin-bottom:10px;
}
.tl-panel-list {
  padding-left:1.15rem;
  color:var(--color-text-muted);
}
.tl-panel-list li {
  margin-bottom:10px;
  font-size:0.9rem;
  line-height:1.65;
}
.tl-theme-header {
  margin:22px 0 12px;
  padding-top:20px;
  border-top:1px solid rgba(224,212,198,0.85);
  grid-column:1 / -1;
}
.tl-theme-header h4 {
  font-size:0.82rem;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--color-accent);
}
.tl-theme-grid {
  margin-top:12px;
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
  gap:16px;
  grid-column:1 / -1;
}
.tl-theme-card {
  width:100%;
  border:1px solid rgba(224,212,198,0.88);
  border-radius:20px;
  padding:20px;
  text-align:left;
  appearance:none;
  -webkit-appearance:none;

  e.preventDefault();
  const val = document.getElementById('pwInput').value;
  if (val === PASS) {
    sessionStorage.setItem('mlAuth', '1');
    document.getElementById('gate').classList.add('hidden');
    setTimeout(() => document.getElementById('gate').style.display = 'none', 500);
  } else {
    document.getElementById('gateError').textContent = 'Incorrect password. Try again.';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

  const g = document.getElementById('gate');
  g.style.display = 'none';
}

  // ── Render ───────────────────────────────────────────────────────────────
  function render(type) {
    const stages = DATA[type];
    const total  = stages.length;

    dotsWrap.innerHTML = stages.map((s, i) => `
      <button class="tl-dot" data-idx="${i}" aria-label="Stage ${i + 1}: ${s.dot}">
        <span class="tl-dot-pip"></span>
        <span class="tl-dot-label">${s.dot}</span>
      </button>`
    ).join('');

    dotsWrap.querySelectorAll('.tl-dot').forEach((d, i) =>
      d.addEventListener('click', () => goTo(i, total))
    );

    prevBtn.onclick = () => goTo(current - 1, total);
    nextBtn.onclick = () => goTo(current + 1, total);

    goTo(0, total);
  }

  function renderPanel(stage) {
    if (!panelLabel || !panelTitle || !panelIntro || !panelBody || !panelLinks) return;
    panelLabel.textContent = stage.panel.label;
    panelTitle.textContent = stage.panel.title;
    panelIntro.textContent = stage.panel.intro;
    const sectionsHtml = stage.panel.sections.map(section => `
      <div class="tl-panel-section">
        <h4>${section.title}</h4>
        <ul class="tl-panel-list">
          ${section.items.map(item => `<li>${item}</li>`).join('')}
        </ul>
      </div>
    `).join('');
    const ethicsCardsHtml = stage.panel.applicationCards ? `
      <div class="tl-ethics-layout">
        <div class="tl-ethics-left" id="tl-ethics-grid">
          ${stage.panel.applicationCards.map((card, idx) => `
            <button type="button" class="tl-ethics-card tl-ethics-card--${card.tone}" data-ethics-idx="${idx}">
              <span class="tl-ethics-code">${card.code}</span>
              <h5>${card.title}</h5>
              <p>${card.summary}</p>
            </button>
          `).join('')}
        </div>
        <div class="tl-ethics-directory" id="tl-ethics-directory"></div>
      </div>
    ` : '';
    const launchHtml = stage.panel.launchCards ? `
      <div class="tl-theme-header">
        <h4>${stage.panel.launchLabel}</h4>
      </div>
      <div class="tl-theme-grid" id="tl-launch-grid">
        ${stage.panel.launchCards.map((card, idx) => `
          <button type="button" class="tl-theme-card tl-theme-card--${card.tone}" data-launch-idx="${idx}">
            <h5>${card.title}</h5>
            <p>${card.summary}</p>
          </button>
        `).join('')}
      </div>
      <div class="tl-theme-modal" id="tl-launch-modal" aria-hidden="true">
        <div class="tl-theme-modal-backdrop" data-close-launch></div>
        <div class="tl-theme-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="tl-launch-modal-title">
          <button type="button" class="tl-theme-modal-close" data-close-launch aria-label="Close launch details">×</button>
          <div class="tl-theme-modal-label">${stage.panel.launchLabel}</div>
          <h5 class="tl-theme-modal-title" id="tl-launch-modal-title"></h5>
          <p class="tl-theme-modal-detail" id="tl-launch-modal-detail"></p>
          <div class="tl-launch-modal-body">
            <div id="tl-launch-modal-sections"></div>
            <div class="step-links" id="tl-launch-modal-links"></div>
          </div>
        </div>
      </div>
    ` : '';
    const themeHtml = stage.panel.themeCards ? `
      <div class="tl-theme-header">
        <h4>${stage.panel.themeLabel}</h4>
        <p class="tl-panel-intro" style="margin-top:8px;">${stage.panel.themeIntro}</p>
      </div>
      <div class="tl-theme-grid" id="tl-theme-grid">
        ${stage.panel.themeCards.map((card, idx) => `
          <button type="button" class="tl-theme-card tl-theme-card--${card.tone}" data-theme-idx="${idx}">
            <h5>${card.title}</h5>
            <p>${card.description}</p>
          </button>
        `).join('')}
      </div>
      <div class="tl-theme-modal" id="tl-theme-modal" aria-hidden="true">
        <div class="tl-theme-modal-backdrop" data-close-theme></div>
        <div class="tl-theme-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="tl-theme-modal-title">
          <button type="button" class="tl-theme-modal-close" data-close-theme aria-label="Close theme details">×</button>
          <div class="tl-theme-modal-label">${stage.panel.themeLabel}</div>
          <h5 class="tl-theme-modal-title" id="tl-theme-modal-title"></h5>
          <p class="tl-theme-modal-detail" id="tl-theme-modal-detail"></p>
          <div class="tl-theme-modal-readings" id="tl-theme-modal-readings"></div>
        </div>
      </div>
    ` : '';
    panelBody.innerHTML = sectionsHtml + ethicsCardsHtml + launchHtml + themeHtml;
    if (stage.panel.applicationCards) {
      const ethicsCards = panelBody.querySelectorAll('.tl-ethics-card');
      const directory = panelBody.querySelector('#tl-ethics-directory');
      const showApplication = idx => {
        const card = stage.panel.applicationCards[idx];
        ethicsCards.forEach((el, i) => el.classList.toggle('tl-ethics-card--active', i === idx));
        if (!directory || !card) return;
        directory.innerHTML = `
          <div class="tl-ethics-directory-header">
            <div>
              <div class="tl-ethics-directory-title">${card.title}</div>
              <div class="tl-ethics-directory-meta">${card.code} • ${card.directory}</div>
            </div>
            <a class="step-tag" href="${encodeURI(card.directory)}" target="_blank">Download folder</a>
          </div>
          <div class="tl-ethics-directory-list">
            ${card.files.map(file => `
              <div class="tl-ethics-file">
                <a href="${encodeURI(file.path)}" target="_blank" rel="noopener">${file.label}</a>
              </div>
            `).join('')}
          </div>
        `;
      };
      ethicsCards.forEach((el, idx) => el.addEventListener('click', () => showApplication(idx)));
      showApplication(0);
    }
    if (stage.panel.launchCards) {
      const launchCards = panelBody.querySelectorAll('.tl-theme-card[data-launch-idx]');
      const modal = panelBody.querySelector('#tl-launch-modal');
      const modalTitle = panelBody.querySelector('#tl-launch-modal-title');
      const modalDetail = panelBody.querySelector('#tl-launch-modal-detail');
      const modalSections = panelBody.querySelector('#tl-launch-modal-sections');
      const modalLinks = panelBody.querySelector('#tl-launch-modal-links');
      const closeTargets = panelBody.querySelectorAll('[data-close-launch]');
      let keydownHandler = null;
      const openLaunch = idx => {
        const card = stage.panel.launchCards[idx];
        launchCards.forEach((el, i) => el.classList.toggle('tl-theme-card--active', i === idx));
        if (!modal || !modalTitle || !modalDetail || !modalSections || !modalLinks || !card) return;
        modalTitle.textContent = card.title;
        modalDetail.textContent = card.detail;
        modalSections.innerHTML = card.sections.map(section => `
          <div class="tl-panel-section">
            <h4>${section.title}</h4>
            <ul class="tl-panel-list">
              ${section.items.map(item => `<li>${item}</li>`).join('')}
            </ul>
          </div>
        `).join('');
        modalLinks.innerHTML = card.links.map(l => `
          <a href="${l.url}" target="_blank" class="step-tag">${l.label}</a>
        `).join('');
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
        keydownHandler = e => {
          if (e.key === 'Escape') closeLaunch();
        };
        document.addEventListener('keydown', keydownHandler);
      };
      const closeLaunch = () => {
        if (!modal) return;
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
        launchCards.forEach(el => el.classList.remove('tl-theme-card--active'));
        if (keydownHandler) {
          document.removeEventListener('keydown', keydownHandler);
          keydownHandler = null;
        }
      };
      closeTargets.forEach(el => el.addEventListener('click', closeLaunch));
      modal?.addEventListener('click', e => {
        if (e.target === modal) closeLaunch();
      });
      launchCards.forEach((el, idx) => el.addEventListener('click', () => openLaunch(idx)));
    }
    if (stage.panel.themeCards) {
      const themeCards = panelBody.querySelectorAll('.tl-theme-card');
      const modal = panelBody.querySelector('#tl-theme-modal');
      const modalTitle = panelBody.querySelector('#tl-theme-modal-title');
      const modalDetail = panelBody.querySelector('#tl-theme-modal-detail');
      const modalReadings = panelBody.querySelector('#tl-theme-modal-readings');
      const closeTargets = panelBody.querySelectorAll('[data-close-theme]');
      let keydownHandler = null;
      const openTheme = idx => {
        const card = stage.panel.themeCards[idx];
        themeCards.forEach((el, i) => el.classList.toggle('tl-theme-card--active', i === idx));
        if (!modal || !modalTitle || !modalDetail || !modalReadings || !card) return;
        modalTitle.textContent = card.title;
        modalDetail.textContent = card.detail;
        modalReadings.innerHTML = card.readings.map(reading => `
          <div class="tl-theme-reading">${reading}</div>
        `).join('');
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
        keydownHandler = e => {
          if (e.key === 'Escape') closeTheme();
        };
        document.addEventListener('keydown', keydownHandler);
      };
      const closeTheme = () => {
        if (!modal) return;
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
        themeCards.forEach(el => el.classList.remove('tl-theme-card--active'));
        if (keydownHandler) {
          document.removeEventListener('keydown', keydownHandler);
          keydownHandler = null;
        }
      };
      closeTargets.forEach(el => el.addEventListener('click', closeTheme));
      modal?.addEventListener('click', e => {
        if (e.target === modal) closeTheme();
      });
      themeCards.forEach((el, idx) => el.addEventListener('click', () => openTheme(idx)));
    }
    panelLinks.innerHTML = stage.links.map(l => `
      <a href="${l.url}" target="_blank" class="step-tag">${l.label}</a>
    `).join('');
    panelLinks.style.display = stage.links.length ? 'flex' : 'none';
  }

  // ── Navigation ───────────────────────────────────────────────────────────
  function goTo(idx, total) {
    total = total ?? DATA[activeType].length;
    current = Math.max(0, Math.min(idx, total - 1));
    const stage = DATA[activeType][current];
    dotsWrap.querySelectorAll('.tl-dot').forEach((d, i) => {
      d.classList.toggle('tl-dot--active', i === current);
      d.classList.toggle('tl-dot--done',   i < current);
    });
    fill.style.width = (total > 1 ? current / (total - 1) * 100 : 0) + '%';
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === total - 1;
    renderPanel(stage);
  }

  const ethicsNav = document.querySelector('.nav-links a[href="#ethics"]');
  if (ethicsNav) {
    ethicsNav.addEventListener('click', e => {
      e.preventDefault();
      const stages = DATA[activeType];
      const ethicsIdx = stages.findIndex(stage => stage.dot === 'Ethics');
      const timeline = document.getElementById('timeline');
      if (timeline) timeline.scrollIntoView({ behavior: 'smooth', block: 'start' });
      if (ethicsIdx >= 0) goTo(ethicsIdx, stages.length);
    });
  }

  // ── Toggle ───────────────────────────────────────────────────────────────
  toggleBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.type === activeType) return;
      activeType = btn.dataset.type;
      toggleBtns.forEach(b => b.classList.toggle('tl-toggle-btn--active', b === btn));
      render(activeType);
    });
  });

  // ── Swipe ────────────────────────────────────────────────────────────────
  render('honours');
})();

// ── Scroll reveal ──────────────────────────────────────────────────────────
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }});
}, { threshold: 0.05, rootMargin: '0px 0px -40px 0px' });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
