name: Update ORCID publications snapshot

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch publications from ORCID
        run: node scripts/fetch-orcid.mjs

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files/publications-orcid-snapshot.json files/publications-orcid-snapshot.js
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "chore: update ORCID publications snapshot [skip ci]" && git push
          )
