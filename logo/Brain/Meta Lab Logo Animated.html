<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meta Lab — Animated Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=DM+Sans:wght@400&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background: #1a1208;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 48px;
  padding: 48px;
}

.card {
  background: #fcf6ef;
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  gap: 20px;
  padding: 32px 44px 32px 36px;
  box-shadow: 0 8px 48px rgba(0,0,0,0.3);
}

/* ── Brain outline draws in ─────────────────────────────── */
.brain-outline {
  stroke-dasharray: 290;
  stroke-dashoffset: 290;
  animation: drawPath 0.9s ease-out 0.1s forwards;
}
.fold-l { stroke-dasharray: 36; stroke-dashoffset: 36; animation: drawPath 0.35s ease-out 0.7s forwards; }
.fold-r { stroke-dasharray: 36; stroke-dashoffset: 36; animation: drawPath 0.35s ease-out 0.8s forwards; }
.fold-c { stroke-dasharray: 30; stroke-dashoffset: 30; animation: drawPath 0.35s ease-out 0.85s forwards; }

@keyframes drawPath { to { stroke-dashoffset: 0; } }

/* ── Magnifying glass swings in ────────────────────────── */
/* Group pivots around brain centre (50,44) */
.glass-group {
  transform-origin: 50px 44px;
  transform: rotate(65deg) scale(0.4);
  opacity: 0;
  animation: swingIn 0.75s cubic-bezier(0.34,1.56,0.64,1) 0.9s forwards;
}
@keyframes swingIn {
  0%   { transform: rotate(65deg) scale(0.4); opacity: 0; }
  100% { transform: rotate(0deg)  scale(1);   opacity: 1; }
}

/* ── Inner fold details inside lens (draw after glass lands) ── */
.lens-fold-top { stroke-dasharray: 30; stroke-dashoffset: 30; animation: drawPath 0.3s ease-out 1.55s forwards; }
.lens-fold-mid { stroke-dasharray: 24; stroke-dashoffset: 24; animation: drawPath 0.3s ease-out 1.65s forwards; }
.lens-fold-vert{ stroke-dasharray: 20; stroke-dashoffset: 20; animation: drawPath 0.25s ease-out 1.7s forwards; }

/* ── Smile appears, grows, returns ─────────────────────── */
.smile-group {
  transform-origin: 50px 52px;
  opacity: 0;
  transform: scale(0.4);
  animation:
    smileAppear 0.35s cubic-bezier(0.34,1.56,0.64,1) 1.85s forwards,
    smileGrow   0.4s  cubic-bezier(0.34,1.56,0.64,1) 2.2s  forwards,
    smileShrink 0.45s cubic-bezier(0.25,1,0.5,1)     2.6s  forwards;
}
@keyframes smileAppear {
  0%   { opacity:0; transform: scale(0.4); }
  100% { opacity:1; transform: scale(1);   }
}
@keyframes smileGrow {
  0%   { transform: scale(1);   }
  100% { transform: scale(1.55); }
}
@keyframes smileShrink {
  0%   { transform: scale(1.55); }
  100% { transform: scale(1);    opacity:1; }
}

/* ── Wordmark fades in ──────────────────────────────────── */
.wordmark-name {
  font-family: 'Caveat', cursive;
  font-size: 46px;
  font-weight: 700;
  color: #2b180a;
  line-height: 0.92;
  opacity: 0;
  transform: translateX(10px);
  animation: fadeSlide 0.6s ease-out 3.0s forwards;
}
.wordmark-sub {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  color: #2b180a;
  opacity: 0;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-top: 7px;
  transform: translateX(10px);
  animation: fadeSlide 0.5s ease-out 3.25s forwards;
}
@keyframes fadeSlide { to { opacity: 0.45; transform: translateX(0); } }
.wordmark-name { animation: fadeSlideOpaque 0.6s ease-out 3.0s forwards; }
@keyframes fadeSlideOpaque { to { opacity: 1; transform: translateX(0); } }

/* ── Replay ─────────────────────────────────────────────── */
.replay {
  padding: 8px 24px;
  background: transparent;
  border: 1.5px solid rgba(242,232,206,0.25);
  color: rgba(242,232,206,0.45);
  border-radius: 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.replay:hover { border-color: rgba(242,232,206,0.7); color: rgba(242,232,206,0.85); }
</style>
</head>
<body>

<svg style="position:absolute;width:0;height:0">
  <defs>
    <filter id="hd">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="5" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<div class="card">
  <!-- Animated SVG -->
  <svg width="130" height="130" viewBox="0 0 100 100" fill="none" style="filter:url(#hd);overflow:visible">

    <!-- Brain outline draws in -->
    <path class="brain-outline"
      d="M28 62 Q14 60 14 46 Q14 34 24 30 Q24 18 36 18 Q40 12 50 14 Q60 12 64 18 Q76 18 76 30 Q86 34 86 46 Q86 60 72 62 Q68 70 60 70 Q54 74 50 72 Q46 74 40 70 Q32 70 28 62Z"
      stroke="#2b180a" stroke-width="2.6" stroke-linejoin="round"/>

    <!-- Brain folds draw in -->
    <path class="fold-l" d="M30 44 Q36 38 36 48 Q36 54 30 56" stroke="#6b5a4a" stroke-width="1.4" stroke-linecap="round" opacity="0.45"/>
    <path class="fold-r" d="M70 44 Q64 38 64 48 Q64 54 70 56" stroke="#6b5a4a" stroke-width="1.4" stroke-linecap="round" opacity="0.45"/>
    <path class="fold-c" d="M50 16 Q50 28 50 42"               stroke="#6b5a4a" stroke-width="1.2" stroke-linecap="round" opacity="0.28"/>

    <!-- Magnifying glass swings in as a group -->
    <g class="glass-group">
      <!-- Lens ring -->
      <circle cx="50" cy="44" r="18" stroke="#2b180a" stroke-width="3" fill="#fcf6ef" fill-opacity="0.55"/>
      <!-- Handle -->
      <line x1="63" y1="57" x2="76" y2="72" stroke="#2b180a" stroke-width="4.5" stroke-linecap="round"/>

      <!-- Lens inner detail draws after glass lands -->
      <path class="lens-fold-top" d="M40 40 Q45 34 50 40 Q55 34 60 40" stroke="#2b180a" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>
      <path class="lens-fold-vert" d="M50 34 Q50 40 50 50" stroke="#6b5a4a" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>

      <!-- Smile group: replaces the fold-mid line -->
      <g class="smile-group">
        <path d="M40 50 Q50 60 60 50" stroke="#2b180a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      </g>
    </g>

  </svg>

  <!-- Wordmark -->
  <div style="line-height:1; padding-bottom:4px;">
    <div class="wordmark-name">Meta Lab</div>
    <div class="wordmark-sub">University of Sydney</div>
  </div>
</div>

<button class="replay" onclick="location.reload()">↺ Replay</button>

<template id="__bundler_thumbnail" data-bg-color="#1a1208">
  <svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="300" height="200" fill="#1a1208"/>
    <rect x="30" y="30" width="240" height="140" rx="14" fill="#fcf6ef"/>
    <ellipse cx="100" cy="100" rx="38" ry="32" stroke="#2b180a" stroke-width="3" fill="none"/>
    <circle cx="100" cy="100" r="18" stroke="#2b180a" stroke-width="2.5" fill="none"/>
    <line x1="112" y1="112" x2="124" y2="128" stroke="#2b180a" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M92 104 Q100 112 108 104" stroke="#2b180a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="150" y="90" font-family="Georgia,serif" font-size="32" font-weight="bold" fill="#2b180a">Meta Lab</text>
    <text x="150" y="114" font-family="Arial,sans-serif" font-size="9" fill="#2b180a" opacity="0.4" letter-spacing="2">UNIVERSITY OF SYDNEY</text>
  </svg>
</template>

</body>
</html>
