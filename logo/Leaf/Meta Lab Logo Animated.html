<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meta Lab — Animated Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=DM+Sans:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1208;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    flex-direction: column;
    gap: 0;
  }

  .stage {
    display: flex;
    align-items: flex-end;
    gap: 18px;
    padding: 48px 56px 48px 48px;
    background: #f2e8ce;
    border-radius: 16px;
  }

  /* ── SVG animation pieces ────────────────────────── */

  /* Soil arc */
  #soil {
    stroke-dasharray: 60;
    stroke-dashoffset: 60;
    animation: draw-line 0.4s ease-out 0.1s forwards;
  }

  /* Stem: grows upward */
  #stem {
    stroke-dasharray: 50;
    stroke-dashoffset: 50;
    animation: draw-line 0.7s cubic-bezier(0.4,0,0.2,1) 0.4s forwards;
  }

  /* Left leaf */
  #leaf-left {
    transform-origin: 25px 32px;
    transform: scale(0);
    opacity: 0;
    animation: unfurl-left 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.95s forwards;
  }

  /* Left leaf vein */
  #vein-left {
    stroke-dasharray: 24;
    stroke-dashoffset: 24;
    animation: draw-line 0.4s ease-out 1.3s forwards;
  }

  /* Right leaf */
  #leaf-right {
    transform-origin: 25px 22px;
    transform: scale(0);
    opacity: 0;
    animation: unfurl-right 0.55s cubic-bezier(0.34,1.56,0.64,1) 1.25s forwards;
  }

  /* Right leaf vein */
  #vein-right {
    stroke-dasharray: 24;
    stroke-dashoffset: 24;
    animation: draw-line 0.4s ease-out 1.6s forwards;
  }

  /* Wordmark */
  .wordmark-name {
    opacity: 0;
    transform: translateX(10px);
    animation: fade-slide 0.6s ease-out 1.6s forwards;
  }

  .wordmark-sub {
    opacity: 0;
    transform: translateX(10px);
    animation: fade-slide 0.5s ease-out 1.9s forwards;
  }

  /* ── Keyframes ───────────────────────────────────── */
  @keyframes draw-line {
    to { stroke-dashoffset: 0; }
  }

  @keyframes unfurl-left {
    0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
    60%  { opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  @keyframes unfurl-right {
    0%   { transform: scale(0) rotate(15deg); opacity: 0; }
    60%  { opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  @keyframes fade-slide {
    to { opacity: 1; transform: translateX(0); }
  }

  /* ── Replay button ───────────────────────────────── */
  .replay {
    margin-top: 28px;
    padding: 8px 20px;
    background: transparent;
    border: 1.5px solid rgba(242,232,206,0.3);
    color: rgba(242,232,206,0.5);
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .replay:hover {
    border-color: rgba(242,232,206,0.7);
    color: rgba(242,232,206,0.9);
  }

  /* ── Dark variant ────────────────────────────────── */
  .variants {
    display: flex;
    gap: 24px;
    margin-top: 36px;
  }

  .stage-dark {
    display: flex;
    align-items: flex-end;
    gap: 18px;
    padding: 36px 44px 36px 38px;
    background: #2d2a1e;
    border-radius: 12px;
    border: 1.5px solid rgba(242,232,206,0.1);
  }

  /* Delay-shifted copies for the dark variant */
  .stage-dark #soil2      { stroke-dasharray:60; stroke-dashoffset:60; animation: draw-line 0.4s ease-out 2.2s forwards; }
  .stage-dark #stem2      { stroke-dasharray:50; stroke-dashoffset:50; animation: draw-line 0.7s cubic-bezier(0.4,0,0.2,1) 2.5s forwards; }
  .stage-dark #leaf-left2 { transform-origin:25px 32px; transform:scale(0); opacity:0; animation: unfurl-left 0.55s cubic-bezier(0.34,1.56,0.64,1) 3.05s forwards; }
  .stage-dark #vein-left2 { stroke-dasharray:24; stroke-dashoffset:24; animation: draw-line 0.4s ease-out 3.45s forwards; }
  .stage-dark #leaf-right2{ transform-origin:25px 22px; transform:scale(0); opacity:0; animation: unfurl-right 0.55s cubic-bezier(0.34,1.56,0.64,1) 3.35s forwards; }
  .stage-dark #vein-right2{ stroke-dasharray:24; stroke-dashoffset:24; animation: draw-line 0.4s ease-out 3.7s forwards; }
  .wm2-name { opacity:0; transform:translateX(10px); animation: fade-slide 0.6s ease-out 3.7s forwards; }
  .wm2-sub  { opacity:0; transform:translateX(10px); animation: fade-slide 0.5s ease-out 4.0s forwards; }
</style>
</head>
<body>

<!-- SVG filter (shared) -->
<svg style="position:absolute;width:0;height:0">
  <defs>
    <filter id="wobble">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<!-- ── PRIMARY: Paper background ──────────────────────────── -->
<div class="stage" id="logo-stage">

  <!-- Animated leaf icon -->
  <svg width="68" height="72" viewBox="0 0 50 54" fill="none" style="filter:url(#wobble); overflow:visible">

    <!-- Soil scribbles -->
    <path id="soil" d="M14 52 Q25 48 36 52" stroke="#1a1208" stroke-width="2.2" fill="none" stroke-linecap="round"/>

    <!-- Stem growing up -->
    <path id="stem" d="M25 52 Q24 40 25 30 Q25 20 24 8"
          stroke="#1a1208" stroke-width="2.8" stroke-linecap="round" fill="none"/>

    <!-- Left leaf (olive) -->
    <path id="leaf-left"
          d="M25 34 Q10 28 8 12 Q20 14 25 30"
          fill="#5a6b28" stroke="#1a1208" stroke-width="2" stroke-linejoin="round"/>

    <!-- Left vein -->
    <path id="vein-left" d="M25 32 Q16 24 12 14"
          stroke="#f2e8ce" stroke-width="0.9" fill="none" stroke-linecap="round" opacity="0.7"/>

    <!-- Right leaf (sage) -->
    <path id="leaf-right"
          d="M25 24 Q40 16 42 2 Q30 4 25 20"
          fill="#7d9145" stroke="#1a1208" stroke-width="2" stroke-linejoin="round"/>

    <!-- Right vein -->
    <path id="vein-right" d="M25 22 Q34 16 39 5"
          stroke="#f2e8ce" stroke-width="0.9" fill="none" stroke-linecap="round" opacity="0.7"/>

  </svg>

  <!-- Wordmark -->
  <div style="padding-bottom:6px; line-height:1;">
    <div class="wordmark-name"
         style="font-family:'Caveat',cursive; font-size:48px; font-weight:700; color:#1a1208; letter-spacing:-0.01em; line-height:0.95;">
      Meta Lab
    </div>
    <div class="wordmark-sub"
         style="font-family:'DM Sans',sans-serif; font-size:10px; color:#1a1208; opacity:0.45; letter-spacing:0.18em; text-transform:uppercase; margin-top:8px;">
      University of Sydney
    </div>
  </div>

</div>

<!-- ── DARK VARIANT ──────────────────────────────────────── -->
<div class="variants">
  <div class="stage-dark">
    <svg width="54" height="58" viewBox="0 0 50 54" fill="none" style="filter:url(#wobble); overflow:visible">
      <path id="soil2" d="M14 52 Q25 48 36 52" stroke="#f2e8ce" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <path id="stem2" d="M25 52 Q24 40 25 30 Q25 20 24 8" stroke="#f2e8ce" stroke-width="2.8" stroke-linecap="round" fill="none"/>
      <path id="leaf-left2" d="M25 34 Q10 28 8 12 Q20 14 25 30" fill="#7d9145" stroke="#f2e8ce" stroke-width="2" stroke-linejoin="round"/>
      <path id="vein-left2" d="M25 32 Q16 24 12 14" stroke="#2d2a1e" stroke-width="0.9" fill="none" stroke-linecap="round" opacity="0.6"/>
      <path id="leaf-right2" d="M25 24 Q40 16 42 2 Q30 4 25 20" fill="#a3b85a" stroke="#f2e8ce" stroke-width="2" stroke-linejoin="round"/>
      <path id="vein-right2" d="M25 22 Q34 16 39 5" stroke="#2d2a1e" stroke-width="0.9" fill="none" stroke-linecap="round" opacity="0.6"/>
    </svg>
    <div style="padding-bottom:5px; line-height:1;">
      <div class="wm2-name" style="font-family:'Caveat',cursive; font-size:38px; font-weight:700; color:#f2e8ce; letter-spacing:-0.01em; line-height:0.95;">Meta Lab</div>
      <div class="wm2-sub" style="font-family:'DM Sans',sans-serif; font-size:9px; color:#f2e8ce; opacity:0.4; letter-spacing:0.18em; text-transform:uppercase; margin-top:7px;">University of Sydney</div>
    </div>
  </div>
</div>

<!-- Replay -->
<button class="replay" onclick="replay()">↺ Replay</button>

<script>
function replay() {
  // Re-trigger by cloning the stage
  const stages = document.querySelectorAll('[id$="-stage"], .stage, .stage-dark, .wordmark-name, .wordmark-sub, .wm2-name, .wm2-sub');
  // Easiest: reload
  location.reload();
}
</script>

<template id="__bundler_thumbnail" data-bg-color="#f2e8ce">
  <svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="400" height="200" fill="#f2e8ce"/>
    <line x1="120" y1="175" x2="120" y2="25" stroke="#1a1208" stroke-width="7" stroke-linecap="round"/>
    <path d="M120 108 Q72 84 74 38 Q108 44 120 98" fill="#5a6b28"/>
    <path d="M120 78 Q168 52 166 8 Q132 14 120 70" fill="#7d9145"/>
    <text x="142" y="132" font-family="Georgia,serif" font-size="60" font-weight="bold" fill="#1a1208">Meta Lab</text>
    <text x="142" y="158" font-family="Arial,sans-serif" font-size="13" fill="#1a1208" opacity="0.4" letter-spacing="3">UNIVERSITY OF SYDNEY</text>
  </svg>
</template>

</body>
</html>
